name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to web server
        run: |
          # Copy built files to web server directory
          # Remove old deployment
          sudo rm -rf /var/www/danieldeepak.com/dist
          
          # Copy new build
          sudo cp -r dist /var/www/danieldeepak.com/
          
          # Set proper permissions (adjust user/group as needed)
          sudo chown -R www-data:www-data /var/www/danieldeepak.com/dist
          sudo chmod -R 755 /var/www/danieldeepak.com/dist
          
          # Reload nginx (you have permission for this)
          sudo systemctl reload nginx || echo "Nginx reload skipped (not running or not needed)"
          
          # Verify deployment
          echo "Deployment complete. Files deployed to /var/www/danieldeepak.com/dist"
          ls -la /var/www/danieldeepak.com/dist | head -10
